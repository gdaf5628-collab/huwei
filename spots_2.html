    <h2>合同廳舍</h2>
    <h3>日治時期消防單位</h3>
     <p>合同廳舍原是「消防」和「警務」的<span class="red">聯合辦公廳舍</span>。
    日治時期消防人員必須派人輪流在塔樓最高處駐守，掌握虎尾市街周邊的動靜，發生火警時敲鐘通知警消人員前往救援。
    </p>
    <p>曾是虎尾<span class="red">最高的建築地標</span>，
    內部空間包含三大部分：郡役所直轄派出所、消防組、公會堂，
    現今經營星巴克咖啡、誠品書局。
    </p>
