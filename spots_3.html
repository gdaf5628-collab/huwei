    <h2>虎尾糖廠</h2>
    <h3>1907年，砂糖製造工廠</h3>
    <p>先有虎尾糖廠，才有虎尾鎮，而虎尾更有<span class="red">「糖都」</span>之稱，
    目前虎尾糖廠是<span class="red">唯二</span>仍在製糖的糖廠之一。</p>

    <h3>馬公厝線</h3>
    <p>現今唯一仍在載運原料的糖鐵路線，
    <span class="red">每年11月至隔年4月間</span>的製糖季，
    <span class="red">五分車</span>往返虎尾糖廠與褒忠鄉的各裝車場載運甘蔗。
    </p>
