    <h2>虎尾驛</h2>
    <h3>1907年，原名為「五間厝驛」</h3>
    <p>日式木構造建築，早年為虎尾糖廠<span class="red">五分火車站</span>，
    車站內仍保留著售票窗口及候車室等空間，目前為僅存的糖業火車站。</p>
    <p>停駛前的糖鐵小火車客運，是許多虎尾人通勤、上課活動的共同記憶。 </p>
