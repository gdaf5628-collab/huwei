    <h2>虎尾鐵橋</h2>
    <h3>舊名番薯莊板仔橋</h3>
    <p><span class="red">英日合作</span>的鐵橋，採用三段高低不等鋼架花樑設計，高者為跨樑，低者為護欄，
    形成不對稱的階梯構造，高腳鏤空及大墩座中有連續拱圈之美。</p>
    <p>可以行駛台鐵與糖鐵的車輛，是糖鐵體系中少見的<span class="red">三軌橋梁</span>。
    整修後開放給民眾步行，成為虎尾的觀光景點之一。
    </p>
